<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tuka Dashboard (Admin/Worker) SELF IMPROVED</title>
  <style>
    body { font-family: system-ui, Arial; margin: 20px; max-width: 980px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; flex: 1; min-width: 300px; }
    input, textarea, button, select { width: 100%; padding: 10px; margin: 6px 0; }
    button { cursor: pointer; }
    pre { background: #f6f6f6; padding: 10px; border-radius: 8px; overflow: auto; }
    .ok { color: #0a7; font-weight: 600; }
    .bad { color: #c00; font-weight: 600; }
    .muted { color: #666; }
    .pill { display:inline-block; padding: 3px 8px; border-radius: 999px; background:#eee; font-size:12px; }
  </style>
</head>
<body>
  <h1>Tuka Dashboard <span class="pill">local</span></h1>

  <div class="card">
    <h3>Connection</h3>
    <label class="muted">API Base URL</label>
    <input id="baseUrl" value="http://127.0.0.1:8787" />
    <button onclick="health()">GET /health</button>
    <div id="healthOut" class="muted"></div>
  </div>

  <div class="row">
    <div class="card">
      <h3>Login</h3>
      <label class="muted">Username</label>
      <input id="username" placeholder="admin or worker1" value="admin" />
      <label class="muted">Password</label>
      <input id="password" type="password" placeholder="password" />
      <button onclick="login()">POST /auth/login</button>
      <button onclick="logout()">Logout (clear token)</button>

      <div style="margin-top:10px">
        <div><span class="muted">Role:</span> <span id="role" class="pill">-</span></div>
        <div><span class="muted">Token:</span></div>
        <pre id="tokenBox">(none)</pre>
      </div>
      <div id="loginOut"></div>
    </div>

    <div class="card">
      <h3>Admin Panel</h3>
      <button onclick="adminUsers()">GET /admin/users</button>
      <button onclick="killSwitch()">POST /admin/kill-switch</button>
      <div id="adminOut"></div>
      <pre id="adminBox"></pre>
    </div>
  </div>

  <div class="row">
    <div class="card">
      <h3>Worker Panel</h3>
      <button onclick="workerPolicy()">GET /worker/policy</button>

      <label class="muted">Task</label>
      <input id="task" placeholder="Follow up lead_123" />
      <label class="muted">Note</label>
      <textarea id="note" rows="3" placeholder="Call after 2pm"></textarea>

      <button onclick="workerTask()">POST /worker/task</button>

      <div id="workerOut"></div>
      <pre id="workerBox"></pre>
    </div>

    <div class="card">
      <h3>Raw Request Tester</h3>
      <label class="muted">Method</label>
      <select id="m">
        <option>GET</option>
        <option>POST</option>
      </select>
      <label class="muted">Path (e.g. /admin/users)</label>
      <input id="p" value="/admin/users" />
      <label class="muted">JSON body (optional)</label>
      <textarea id="b" rows="5">{}</textarea>
      <button onclick="raw()">Send</button>
      <div id="rawOut"></div>
      <pre id="rawBox"></pre>
    </div>
  </div>

<script>
  function getBase() {
    return document.getElementById("baseUrl").value.trim().replace(/\/+$/, "");
  }

  function setStatus(elId, ok, msg) {
    const el = document.getElementById(elId);
    el.className = ok ? "ok" : "bad";
    el.textContent = msg;
  }

  function saveAuth(auth) {
    localStorage.setItem("tuka_auth", JSON.stringify(auth));
    renderAuth();
  }

  function loadAuth() {
    try { return JSON.parse(localStorage.getItem("tuka_auth") || "null"); }
    catch { return null; }
  }

  function renderAuth() {
    const auth = loadAuth();
    document.getElementById("role").textContent = auth?.role || "-";
    document.getElementById("tokenBox").textContent = auth?.token || "(none)";
  }

  function authHeader() {
    const auth = loadAuth();
    if (!auth?.token) return {};
    return { "Authorization": "Bearer " + auth.token };
  }

  async function api(method, path, body) {
    const url = getBase() + path;
    const opts = {
      method,
      headers: {
        "Content-Type": "application/json",
        ...authHeader(),
      }
    };
    if (body !== undefined && method !== "GET") {
      opts.body = JSON.stringify(body);
    }
    const res = await fetch(url, opts);
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); }
    catch { data = text; }
    return { ok: res.ok, status: res.status, data };
  }

  async function health() {
    const r = await api("GET", "/health");
    setStatus("healthOut", r.ok, `HTTP ${r.status}: ` + (typeof r.data === "string" ? r.data : JSON.stringify(r.data)));
  }

  async function login() {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value;
    const r = await api("POST", "/auth/login", { username: u, password: p });

    if (r.ok && r.data?.token) {
      saveAuth({ token: r.data.token, role: r.data.role || "-", user_id: r.data.user_id || u });
      setStatus("loginOut", true, `Logged in: ${r.data.user_id || u} (${r.data.role || "-"})`);
    } else {
      setStatus("loginOut", false, `Login failed (HTTP ${r.status}): ` + (typeof r.data === "string" ? r.data : JSON.stringify(r.data)));
    }
  }

  function logout() {
    localStorage.removeItem("tuka_auth");
    renderAuth();
    setStatus("loginOut", true, "Cleared token.");
  }

  async function adminUsers() {
    const r = await api("GET", "/admin/users");
    setStatus("adminOut", r.ok, `HTTP ${r.status}`);
    document.getElementById("adminBox").textContent = (typeof r.data === "string") ? r.data : JSON.stringify(r.data, null, 2);
  }

  async function killSwitch() {
    const r = await api("POST", "/admin/kill-switch", {});
    setStatus("adminOut", r.ok, `HTTP ${r.status} (kill-switch)`);
    document.getElementById("adminBox").textContent = (typeof r.data === "string") ? r.data : JSON.stringify(r.data, null, 2);
    // if kill-switch succeeded, local token is likely invalid now
  }

  async function workerPolicy() {
    const r = await api("GET", "/worker/policy");
    setStatus("workerOut", r.ok, `HTTP ${r.status}`);
    document.getElementById("workerBox").textContent = (typeof r.data === "string") ? r.data : JSON.stringify(r.data, null, 2);
  }

  async function workerTask() {
    const task = document.getElementById("task").value.trim();
    const note = document.getElementById("note").value.trim();
    const r = await api("POST", "/worker/task", { task, note });
    setStatus("workerOut", r.ok, `HTTP ${r.status}`);
    document.getElementById("workerBox").textContent = (typeof r.data === "string") ? r.data : JSON.stringify(r.data, null, 2);
  }

  async function raw() {
    const m = document.getElementById("m").value;
    const p = document.getElementById("p").value.trim();
    let btxt = document.getElementById("b").value;
    let body;
    try { body = JSON.parse(btxt); } catch { body = btxt; }
    const r = await api(m, p, m === "GET" ? undefined : body);
    setStatus("rawOut", r.ok, `HTTP ${r.status}`);
    document.getElementById("rawBox").textContent = (typeof r.data === "string") ? r.data : JSON.stringify(r.data, null, 2);
  }

  renderAuth();
</script>
</body>
</html>
